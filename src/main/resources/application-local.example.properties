# 本地 MySQL 示例配置：复制为 application-local.properties 后再填写本机密码。
spring.datasource.url=jdbc:mysql://localhost:3306/study_task?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

# 本地开发环境的 JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
